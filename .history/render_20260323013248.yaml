services:
  - type: web
    name: directu-api
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false  # set manually in Render dashboard
      - key: NODE_ENV
        value: production
      - key: AI_SERVICE_URL
        sync: false  # set to your FastAPI Render URL after deploying it

  - type: web
    name: directu-ai
    runtime: python
    rootDir: src/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: postgresql://neondb_owner:npg_jtQUS2id7xDm@ep-late-fire-a1djp2yw-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
